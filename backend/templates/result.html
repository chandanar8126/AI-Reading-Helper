{% extends "base.html" %}
{% block content %}
<section class="result-section">
  <div class="result-box">
    <h3>Original text</h3>
    <p id="original-text">{{ original_text }}</p>
  </div>
  <div class="result-box">
    <h3>Simplified text</h3>
    <p id="simplified-text" class="selectable-text">{{ simplified_text }}</p>
  </div>

  {% if audio_path %}
  <div class="card audio-card">
    <h3>Listen to audio</h3>
    <audio controls autoplay>
      <source src="{{ audio_path }}" type="audio/mp3">
      Your browser does not support the audio element.
    </audio>
  </div>
  {% endif %}

  <div class="result-actions">
    <a href="{{ url_for('practice') }}" class="btn-primary">Try another text</a>
    <a href="{{ url_for('history') }}" class="btn-secondary">View history</a>
  </div>

  <div class="hint-box result-hint">
    <strong>Tip:</strong> double-click any word in the simplified text to see synonyms.
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/webgazer@2.0.1/dist/webgazer.min.js"></script>

<script>
  const GAZE_DURATION_MS = 2500;
  let gazeActive = false;
  let gazeTimer = null;
  let currentGazeWord = null;
  let lastSpokenWord = null;
  let speechUtterance = null;

  function tokenizeSimplifiedText() {
    const simplifiedNode = document.getElementById('simplified-text');
    if (!simplifiedNode) return;

    const text = simplifiedNode.textContent.trim();
    if (!text) return;

    const tokens = text.split(/(\s+)/);
    simplifiedNode.innerHTML = tokens.map(token => {
      if (/^\s+$/.test(token)) return token;
      const escaped = token.replace(/"/g, '&quot;');
      return `<span class="gaze-word" data-word="${escaped}">${token}</span>`;
    }).join('');
  }

  function clearWordHighlights() {
    document.querySelectorAll('.gaze-word.focused-word').forEach(word => {
      word.classList.remove('focused-word');
    });
  }

  function speakText(textToSpeak) {
    if (!('speechSynthesis' in window)) return;
    if (speechUtterance) window.speechSynthesis.cancel();
    speechUtterance = new SpeechSynthesisUtterance(textToSpeak);
    speechUtterance.rate = 0.9;
    speechUtterance.volume = 1;
    window.speechSynthesis.speak(speechUtterance);
  }

  function applyStruggleEmphasis(el) {
    // Temporarily increase spacing/size around the struggled word so it's
    // easier to re-read, then fade back after a few seconds.
    el.classList.add('struggle-emphasis');
    setTimeout(() => el.classList.remove('struggle-emphasis'), 8000);
  }

  function notifyServerOfStruggle(word) {
    fetch('/log-struggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ word: word, text_id: null })
    }).catch(err => console.warn('Could not log struggle word:', err));
  }

  function trackGazePoint(data) {
    if (!data) return;
    const x = Math.round(data.x);
    const y = Math.round(data.y);

    const el = document.elementFromPoint(x, y);
    if (!el || !el.classList.contains('gaze-word')) {
      if (gazeTimer) { clearTimeout(gazeTimer); gazeTimer = null; }
      currentGazeWord = null;
      return;
    }

    const word = el.dataset.word;
    if (currentGazeWord !== word) {
      clearWordHighlights();
      currentGazeWord = word;
      if (gazeTimer) clearTimeout(gazeTimer);

      gazeTimer = setTimeout(() => {
        if (currentGazeWord === word) {
          el.classList.add('focused-word');
          applyStruggleEmphasis(el);
          notifyServerOfStruggle(word);

          if (lastSpokenWord !== word) {
            speakText(word);
            lastSpokenWord = word;
          }

          // Auto-show synonyms — no click needed once a struggle is detected.
          const rect = el.getBoundingClientRect();
          fetchSynonyms(word, rect.left, rect.bottom);
        }
      }, GAZE_DURATION_MS);
    }
  }

  const CALIBRATION_CLICKS_NEEDED = 5;
  let calibrationData = {};
  let calibrationActive = false;

  function buildCalibrationOverlay() {
    const overlay = document.createElement('div');
    overlay.id = 'calibration-overlay';
    overlay.className = 'calibration-overlay';

    const intro = document.createElement('div');
    intro.className = 'calibration-intro';
    intro.innerHTML = `
    <h3>Quick calibration</h3>
    <p>Click each dot ${CALIBRATION_CLICKS_NEEDED} times while looking directly at it. This takes about 30 seconds and makes word-tracking far more accurate.</p>
  `;
    overlay.appendChild(intro);

    const positions = [
      [5, 5], [50, 5], [95, 5],
      [5, 50], [50, 50], [95, 50],
      [5, 95], [50, 95], [95, 95]
    ];

    positions.forEach((pos, i) => {
      const dot = document.createElement('button');
      dot.className = 'calibration-dot';
      dot.style.left = pos[0] + '%';
      dot.style.top = pos[1] + '%';
      dot.dataset.dotId = i;
      dot.setAttribute('aria-label', 'Calibration point ' + (i + 1));
      calibrationData[i] = 0;

      dot.addEventListener('click', function () {
        calibrationData[i] = Math.min(calibrationData[i] + 1, CALIBRATION_CLICKS_NEEDED);
        const progress = calibrationData[i] / CALIBRATION_CLICKS_NEEDED;
        dot.style.setProperty('--fill', progress);
        if (calibrationData[i] >= CALIBRATION_CLICKS_NEEDED) {
          dot.classList.add('calibration-dot-done');
        }
        checkCalibrationComplete();
      });

      overlay.appendChild(dot);
    });

    const skipBtn = document.createElement('button');
    skipBtn.className = 'btn-secondary calibration-skip';
    skipBtn.textContent = 'Skip calibration';
    skipBtn.addEventListener('click', finishCalibration);
    overlay.appendChild(skipBtn);

    return overlay;
  }

  function checkCalibrationComplete() {
    const allDone = Object.values(calibrationData).every(c => c >= CALIBRATION_CLICKS_NEEDED);
    if (allDone) finishCalibration();
  }

  function finishCalibration() {
    if (!calibrationActive) return;
    calibrationActive = false;
    const overlay = document.getElementById('calibration-overlay');
    if (overlay) overlay.remove();

    webgazer.setGazeListener((data) => { if (data) trackGazePoint(data); });
    showNotification('Calibration complete. Eye-gaze reading is now active.', 'success');
  }

  function startGazeTracking() {
    if (gazeActive) return;
    gazeActive = true;

    if (!window.webgazer) {
      console.warn('WebGazer not loaded. Eye tracking will not run.');
      showNotification('Eye tracking library failed to load.', 'error');
      gazeActive = false;
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showNotification('Webcam access is not supported by this browser.', 'error');
      gazeActive = false;
      return;
    }

    webgazer.setRegression('ridge');
    showNotification('Requesting camera access. Please allow the webcam prompt.', 'info');

    const beginResult = webgazer.begin();
    const handleSuccess = () => {
      webgazer.showVideo(true).showPredictionPoints(true).showFaceOverlay(true).showFaceFeedbackBox(true);
      calibrationActive = true;
      calibrationData = {};
      document.body.appendChild(buildCalibrationOverlay());
    };

    const handleError = err => {
      console.error('WebGazer begin failed:', err);
      showNotification('Unable to start webcam. Please allow camera permissions or try a supported browser.', 'error');
      gazeActive = false;
    };

    if (beginResult && typeof beginResult.then === 'function') {
      beginResult.then(handleSuccess).catch(handleError);
    } else {
      try {
        handleSuccess();
      } catch (err) {
        handleError(err);
      }
    }
  }

  function stopGazeTracking() {
    if (!gazeActive || !window.webgazer) return;
    webgazer.pause();
    gazeActive = false;
    calibrationActive = false;
    const overlay = document.getElementById('calibration-overlay');
    if (overlay) overlay.remove();
    if (gazeTimer) { clearTimeout(gazeTimer); gazeTimer = null; }
    currentGazeWord = null;
  }

  function initializeResultPage() {
    tokenizeSimplifiedText();
    const simplifiedText = document.getElementById('simplified-text');
    if (simplifiedText) {
      simplifiedText.addEventListener('dblclick', function (e) {
        const selection = window.getSelection();
        const word = selection.toString().trim();
        if (word && word.split(' ').length === 1 && /^[a-zA-Z]+$/.test(word)) {
          fetchSynonyms(word, e.clientX, e.clientY);
        }
      });
    }

    const actionRow = document.createElement('div');
    actionRow.className = 'gaze-controls';

    const startButton = document.createElement('button');
    startButton.textContent = 'Start gaze reader';
    startButton.className = 'btn-secondary';
    startButton.addEventListener('click', startGazeTracking);

    const stopButton = document.createElement('button');
    stopButton.textContent = 'Stop gaze reader';
    stopButton.className = 'btn-secondary';
    stopButton.addEventListener('click', stopGazeTracking);

    actionRow.append(startButton, stopButton);
    document.querySelector('.result-section').prepend(actionRow);
  }

  window.addEventListener('DOMContentLoaded', initializeResultPage);

  function fetchSynonyms(word, x, y) {
    showLoadingPopup(word, x, y);

    fetch(`/synonym?word=${encodeURIComponent(word)}`)
      .then(response => {
        if (!response.ok) {
          return response.text().then(text => {
            console.error(`Synonym API error ${response.status}:`, text);
            throw new Error('Synonym API error');
          });
        }
        return response.json();
      })
      .then(data => {
        const loadingPopup = document.querySelector('.synonym-popup');
        if (loadingPopup) loadingPopup.remove();
        if (data && data.synonyms && data.synonyms.length > 0) {
          showSynonymPopup(word, data.synonyms, x, y);
        } else {
          showSynonymPopup(word, ['No synonyms found'], x, y);
        }
      })
      .catch(error => {
        console.error('Error fetching synonyms:', error);
        const loadingPopup = document.querySelector('.synonym-popup');
        if (loadingPopup) loadingPopup.remove();
        showSynonymPopup(word, ['Error loading synonyms'], x, y);
      });
  }

  function showLoadingPopup(word, x, y) {
    const popup = document.createElement('div');
    popup.className = 'synonym-popup';
    popup.style.left = `${x}px`;
    popup.style.top = `${y + 20}px`;

    popup.innerHTML = `
    <div class="synonym-popup-title">Loading synonyms for "${word}"...</div>
    <div class="synonym-popup-spinner"><div class="spinner"></div></div>
  `;
    document.body.appendChild(popup);
  }

  function showSynonymPopup(word, synonyms, x, y) {
    const existingPopup = document.querySelector('.synonym-popup');
    if (existingPopup) existingPopup.remove();

    const popup = document.createElement('div');
    popup.className = 'synonym-popup';

    const maxX = window.innerWidth - 320;
    const maxY = window.innerHeight - 300;
    popup.style.left = `${Math.min(x, maxX)}px`;
    popup.style.top = `${Math.min(y + 20, maxY)}px`;

    const synonymHTML = synonyms.map(syn => `
    <span class="synonym-chip" onclick="copyToClipboard('${syn}')">${syn}</span>
  `).join('');

    popup.innerHTML = `
    <div class="synonym-popup-header">
      <span>"${word}"</span>
      <button class="synonym-popup-close" onclick="this.closest('.synonym-popup').remove()">&times;</button>
    </div>
    <div class="synonym-popup-label">Synonyms</div>
    <div class="synonym-chip-row">${synonymHTML}</div>
    <button class="btn-primary synonym-popup-done" onclick="this.closest('.synonym-popup').remove()">Close</button>
  `;

    document.body.appendChild(popup);

    setTimeout(() => { if (popup.parentElement) popup.remove(); }, 15000);

    setTimeout(() => {
      document.addEventListener('click', function closePopup(e) {
        if (!popup.contains(e.target)) {
          popup.remove();
          document.removeEventListener('click', closePopup);
        }
      });
    }, 100);
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      showNotification(`Copied "${text}" to clipboard`, 'success');
    }).catch(err => console.error('Failed to copy:', err));
  }

  function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `toast-notification toast-${type || 'info'}`;
    notification.textContent = message;
    document.body.appendChild(notification);

    setTimeout(() => {
      notification.classList.add('toast-out');
      setTimeout(() => notification.remove(), 300);
    }, 3000);
  }
</script>
{% endblock %}
