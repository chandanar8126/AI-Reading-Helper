{% extends "base.html" %}
{% block content %}
<section class="auth-section">
  <div class="card auth-card">
    <div class="auth-header">
      <h2>Welcome back</h2>
      <p>Sign in to continue your reading journey</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="email" class="field">Email address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="field">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="auth-row">
        <label class="auth-checkbox">
          <input type="checkbox" name="remember">
          <span>Remember me</span>
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary auth-submit">Sign in</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('signup') }}" class="auth-link">Sign up</a></p>
    </div>
  </div>
</section>
{% endblock %}
