{% extends "base.html" %}
{% block content %}

<div class="error-page">
    <div class="error-code">500</div>
    <h1>Something went wrong on our end</h1>
    <p>We hit an unexpected error. It's not you — it's us. Try again in a moment.</p>
    <a href="{{ url_for('home') }}" class="btn-primary">Back to Home</a>
</div>

<style>
    .error-page {
        max-width: 500px;
        margin: 4rem auto;
        text-align: center;
        padding: 2rem;
    }

    .error-code {
        font-size: 6rem;
        font-weight: 800;
        color: #ef4444;
        line-height: 1;
    }

    .error-page h1 {
        margin: 1rem 0;
        color: #1e293b;
    }

    .error-page p {
        color: #64748b;
        margin-bottom: 2rem;
    }

    .btn-primary {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
    }
</style>

{% endblock %}
