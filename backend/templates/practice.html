{% extends "base.html" %}
{% block content %}
<section class="practice-section">
  <div class="practice-header">
    <h2>Reading practice</h2>
    <p>Transform complex text into easy-to-understand content</p>
  </div>

  <div class="card form-box">
    <form action="{{ url_for('process') }}" method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="hint-box">
        Tip: double-click any word in the result to view its synonyms.
      </div>

      <div class="tab-bar">
        <button type="button" class="tab-btn active" data-tab="text">Text input</button>
        <button type="button" class="tab-btn" data-tab="image">Image upload</button>
      </div>

      <div class="tab-content" id="text-tab">
        <label for="text_input" class="field">Enter or paste your text</label>
        <textarea id="text_input" name="text_input" rows="8" placeholder="Paste your text here..."></textarea>
      </div>

      <div class="tab-content" id="image-tab" style="display: none;">
        <label for="image" class="field">Upload an image with text</label>
        <div id="drop-zone" class="drop-zone">
          <p>Drag and drop your image here, or click to browse</p>
          <input type="file" name="image" id="image" accept="image/*" style="display: none;">
        </div>
      </div>

      <div class="level-select">
        <label class="field">Select reading level</label>
        <div class="level-options">
          <label><input type="radio" name="level" value="basic" checked> Basic</label>
          <label><input type="radio" name="level" value="intermediate"> Intermediate</label>
          <label><input type="radio" name="level" value="advanced"> Advanced</label>
        </div>
      </div>

      <div class="practice-submit">
        <button type="submit" class="btn-primary">Simplify text</button>
      </div>
    </form>
  </div>
</section>

<script>
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
      document.getElementById(this.dataset.tab + '-tab').style.display = 'block';
    });
  });

  const dropZone = document.getElementById('drop-zone');
  const imageInput = document.getElementById('image');
  dropZone.addEventListener('click', () => imageInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
      imageInput.files = e.dataTransfer.files;
      dropZone.querySelector('p').textContent = e.dataTransfer.files[0].name;
    }
  });
  imageInput.addEventListener('change', () => {
    if (imageInput.files.length) {
      dropZone.querySelector('p').textContent = imageInput.files[0].name;
    }
  });
</script>
{% endblock %}
