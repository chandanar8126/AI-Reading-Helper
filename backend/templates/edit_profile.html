{% extends "base.html" %}
{% block content %}

<div class="edit-profile-container">
    <div class="card">
        <h1 class="card-title">⚙️ Edit Profile</h1>

        <form method="POST" action="{{ url_for('edit_profile') }}" class="edit-profile-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" value="{{ user.full_name or '' }}" required>
            </div>

            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="4"
                    placeholder="Tell us about yourself...">{{ user.bio or '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="reading_level">Default Reading Level</label>
                <select id="reading_level" name="reading_level">
                    <option value="basic" {% if user.reading_level=='basic' %}selected{% endif %}>Basic</option>
                    <option value="intermediate" {% if user.reading_level=='intermediate' %}selected{% endif %}>
                        Intermediate</option>
                    <option value="advanced" {% if user.reading_level=='advanced' %}selected{% endif %}>Advanced
                    </option>
                </select>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('profile') }}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<style>
    .edit-profile-container {
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .edit-profile-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        margin-top: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group label {
        font-weight: 600;
        color: #475569;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        padding: 0.75rem 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        outline: none;
        border-color: #6366f1;
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
        margin-top: 0.5rem;
    }

    .btn-primary {
        padding: 0.75rem 1.5rem;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
    }

    .btn-secondary {
        padding: 0.75rem 1.5rem;
        background: #f8fafc;
        color: #475569;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
    }
</style>

{% endblock %}
